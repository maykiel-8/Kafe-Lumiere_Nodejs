<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="page-title"><h2>Dashboard</h2><span class="muted" id="todayLabel"></span></div>

    <div class="stats" id="statCards"></div>

    <div class="charts-grid mb">
      <div class="chart-card"><h3 id="lineTitle">Sales Trend</h3><canvas id="lineChart" height="220"></canvas></div>
      <div class="chart-card"><h3 id="barTitle">Best Sellers</h3><canvas id="barChart" height="220"></canvas></div>
      <div class="chart-card"><h3 id="pieTitle">Revenue by Category</h3><canvas id="pieChart" height="220"></canvas></div>
    </div>

    <div class="card mb">
      <div class="flex between center wrap gap">
        <h3 style="margin:0">Sales Reports</h3>
        <div class="flex gap wrap">
          <select id="reportPeriod" style="max-width:160px">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
          </select>
          <button class="btn btn-outline btn-sm" id="loadReportBtn">Run</button>
          <button class="btn btn-ghost btn-sm" id="exportPdfBtn">Export PDF</button>
          <button class="btn btn-ghost btn-sm" id="exportExcelBtn">Export Excel</button>
        </div>
      </div>
      <div id="reportBody" class="mt"></div>
    </div>

    <div class="card" id="logsCard">
      <h3>Recent Activity Log</h3>
      <table class="simple" id="logsTable"><thead><tr><th>When</th><th>User</th><th>Action</th><th>Details</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script>
    renderHeader('dashboard');
    initDashboard();
  </script>
</body>
</html>
