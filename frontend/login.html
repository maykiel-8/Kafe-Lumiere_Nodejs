<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1 style="text-align:center">Welcome back</h1>
      <p class="muted" style="text-align:center;margin-top:-6px">Sign in to your Kafé Lumière account</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>
      <p class="muted mt" style="text-align:center">No account? <a href="register.html">Create one</a></p>
      <div class="card" style="background:var(--purple-100);box-shadow:none;margin-top:16px;font-size:.8rem">
        <strong>Demo accounts</strong>
        <div class="muted">admin@kafe.test / admin123</div>
        <div class="muted">cashier@kafe.test / cashier123</div>
        <div class="muted">customer@kafe.test / customer123</div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/user.js"></script>
  <script>
    renderHeader('login');
    initLogin();
  </script>
</body>
</html>
