<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="page-title"><h2>Product Management</h2></div>

    <div class="tabs">
      <div class="tab active" data-tab="products">Products</div>
      <div class="tab" data-tab="categories">Categories</div>
      <div class="tab" data-tab="sizes">Sizes</div>
      <div class="tab" data-tab="addons">Add-ons</div>
    </div>

    <!-- Products tab -->
    <div id="tab-products">
      <div class="toolbar">
        <button class="btn btn-primary" id="newItemBtn">+ New Product</button>
      </div>
      <div class="card">
        <table id="itemsTable" class="dt" style="width:100%">
          <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Available</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Categories tab -->
    <div id="tab-categories" class="hidden">
      <div class="toolbar">
        <input id="newCatName" placeholder="Category name" class="grow" />
        <button class="btn btn-primary" id="addCatBtn">Add Category</button>
      </div>
      <div class="card"><table class="simple" id="catTable"><thead><tr><th>ID</th><th>Name</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- Sizes tab -->
    <div id="tab-sizes" class="hidden">
      <div class="toolbar">
        <input id="newSizeName" placeholder="Size name" style="max-width:200px" />
        <input id="newSizeMod" type="number" placeholder="Price modifier" style="max-width:180px" />
        <button class="btn btn-primary" id="addSizeBtn">Add Size</button>
      </div>
      <div class="card"><table class="simple" id="sizeTable"><thead><tr><th>ID</th><th>Name</th><th>+Price</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- Add-ons tab -->
    <div id="tab-addons" class="hidden">
      <div class="toolbar">
        <input id="newAddonName" placeholder="Add-on name" style="max-width:200px" />
        <input id="newAddonPrice" type="number" placeholder="Price" style="max-width:160px" />
        <button class="btn btn-primary" id="addAddonBtn">Add Add-on</button>
      </div>
      <div class="card"><table class="simple" id="addonTable"><thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Actions</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>

  <!-- Item modal -->
  <div class="modal-overlay" id="itemModal">
    <div class="modal">
      <div class="flex between center"><h2 id="itemModalTitle">New Product</h2><button class="btn btn-sm btn-ghost" onclick="closeModal('itemModal')">&times;</button></div>
      <form id="itemForm" novalidate>
        <input type="hidden" id="iId" />
        <div class="form-group"><label>Name</label><input id="iName" name="name" /></div>
        <div class="form-group"><label>Description</label><textarea id="iDesc" name="description" rows="2"></textarea></div>
        <div class="opt-row">
          <div class="form-group"><label>Base Price</label><input id="iPrice" name="basePrice" type="number" step="0.01" /></div>
          <div class="form-group"><label>Category</label><select id="iCategory" name="categoryId"></select></div>
        </div>
        <div class="form-group"><label>Image (optional)</label><input id="iImage" name="image" type="file" accept="image/*" /></div>
        <div class="form-group"><label><input type="checkbox" id="iAvailable" checked style="width:auto;margin-right:8px" />Available</label></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Save Product</button>
      </form>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/item.js"></script>
  <script>
    renderHeader('item');
    initItemAdmin();
  </script>
</body>
</html>
