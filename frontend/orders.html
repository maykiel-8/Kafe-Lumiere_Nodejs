<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="page-title"><h2 id="ordersTitle">My Orders</h2></div>

    <div class="toolbar">
      <input type="text" id="orderSearch" class="grow" placeholder="Search by order number..." />
      <select id="statusFilter" style="max-width:200px">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="preparing">Preparing</option>
        <option value="ready">Ready</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <div class="card">
      <table id="ordersTable" class="dt" style="width:100%">
        <thead><tr>
          <th>Order #</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Order detail modal -->
  <div class="modal-overlay" id="orderModal">
    <div class="modal modal-lg">
      <div class="flex between center"><h2 id="omTitle">Order</h2><button class="btn btn-sm btn-ghost" onclick="closeModal('orderModal')">&times;</button></div>
      <div id="omBody"></div>
    </div>
  </div>

  <!-- Payment modal -->
  <div class="modal-overlay" id="payModal">
    <div class="modal">
      <div class="flex between center"><h2>Process Payment</h2><button class="btn btn-sm btn-ghost" onclick="closeModal('payModal')">&times;</button></div>
      <input type="hidden" id="payOrderId" />
      <p class="muted" id="payOrderInfo"></p>
      <div class="form-group"><label>Amount Due</label><input type="text" id="payDue" readonly /></div>
      <div class="form-group"><label>Cash Received</label><input type="number" id="payCash" min="0" step="0.01" placeholder="0.00" /></div>
      <div class="flex between center mt"><strong>Change</strong><strong style="color:var(--gold)" id="payChange">₱0.00</strong></div>
      <button class="btn btn-primary mt" style="width:100%" id="payConfirm">Confirm Payment</button>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/order.js"></script>
  <script>
    renderHeader('orders');
    initOrders();
  </script>
</body>
</html>
