<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="page-title"><h2>My Profile</h2></div>
    <div class="grid" style="grid-template-columns:1fr 1fr;align-items:start">
      <div class="card">
        <h3>Account Details</h3>
        <form id="profileForm" novalidate>
          <div class="form-group"><label>Name</label><input id="pName" name="name" /></div>
          <div class="form-group"><label>Email</label><input id="pEmail" name="email" disabled /></div>
          <div class="form-group"><label>Phone</label><input id="pPhone" name="phone" /></div>
          <div class="form-group"><label>Address</label><textarea id="pAddress" name="address" rows="2"></textarea></div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
      <div class="card">
        <h3>Change Password</h3>
        <form id="passwordForm" novalidate>
          <div class="form-group"><label>Current Password</label><input id="currentPassword" name="currentPassword" type="password" /></div>
          <div class="form-group"><label>New Password</label><input id="newPassword" name="newPassword" type="password" /></div>
          <div class="form-group"><label>Confirm New Password</label><input id="confirmPassword" name="confirmPassword" type="password" /></div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
        <hr style="border:none;border-top:1px solid #eee;margin:20px 0" />
        <a class="btn btn-outline" href="deactivate.html">Deactivate my account</a>
      </div>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/user.js"></script>
  <script>
    renderHeader('profile');
    initProfile();
  </script>
</body>
</html>
