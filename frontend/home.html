<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kafé Lumière &middot; Milk Tea</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="hero">
      <div class="blob"></div><div class="blob two"></div>
      <h1>Lumière in every sip.</h1>
      <p>Hand-crafted milk teas, fruit teas, and premium brews. Browse our menu, customize your drink, and order in seconds.</p>
    </div>

    <div class="page-title">
      <h2>Our Menu</h2>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search drinks..." autocomplete="off" />
        <div class="autocomplete" id="acBox"></div>
      </div>
    </div>

    <div class="toolbar">
      <select id="categoryFilter" style="max-width:220px"><option value="">All categories</option></select>
    </div>

    <div class="cards-grid" id="menuGrid"></div>
    <div id="loadMore" class="empty hidden"><div class="spinner"></div></div>
    <div id="endMsg" class="empty hidden muted">You've reached the end of the menu.</div>
  </div>

  <!-- Customize / Add to cart modal -->
  <div class="modal-overlay" id="customizeModal">
    <div class="modal">
      <div class="flex between center">
        <h2 id="cmTitle">Customize</h2>
        <button class="btn btn-sm btn-ghost" onclick="closeModal('customizeModal')">&times;</button>
      </div>
      <p class="muted" id="cmDesc"></p>
      <input type="hidden" id="cmItemId" />
      <div class="form-group">
        <label>Size</label>
        <select id="cmSize"></select>
      </div>
      <div class="opt-row">
        <div class="form-group">
          <label>Sugar level</label>
          <select id="cmSugar">
            <option>0%</option><option>25%</option><option>50%</option><option selected>100%</option><option>120%</option>
          </select>
        </div>
        <div class="form-group">
          <label>Ice level</label>
          <select id="cmIce">
            <option>No Ice</option><option>Less</option><option selected>Regular</option><option>Extra</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Add-ons</label>
        <div id="cmAddons" class="flex wrap gap-sm"></div>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <div class="qty-control">
          <button type="button" onclick="cmQty(-1)">-</button>
          <input type="number" id="cmQty" value="1" min="1" style="width:70px;text-align:center" />
          <button type="button" onclick="cmQty(1)">+</button>
        </div>
      </div>
      <div class="flex between center mt">
        <strong style="font-size:1.2rem;color:var(--gold)" id="cmTotal">₱0.00</strong>
        <button class="btn btn-primary" id="cmAddBtn">Add to Cart</button>
      </div>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop — Advance Web Application Final Project</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
  <script>
    renderHeader('home');
    initHome();
  </script>
</body>
</html>
