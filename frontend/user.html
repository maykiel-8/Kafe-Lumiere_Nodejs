<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users &middot; Kafé Lumière</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="header"></div>
  <div class="container">
    <div class="page-title"><h2>User Management</h2></div>
    <div class="toolbar"><button class="btn btn-primary" id="newUserBtn">+ New User</button></div>
    <div class="card">
      <table id="usersTable" class="dt" style="width:100%">
        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="flex between center"><h2 id="userModalTitle">New User</h2><button class="btn btn-sm btn-ghost" onclick="closeModal('userModal')">&times;</button></div>
      <form id="userForm" novalidate>
        <input type="hidden" id="uId" />
        <div class="form-group"><label>Name</label><input id="uName" name="name" /></div>
        <div class="form-group"><label>Email</label><input id="uEmail" name="email" type="email" /></div>
        <div class="opt-row">
          <div class="form-group"><label>Role</label>
            <select id="uRole" name="role"><option value="customer">Customer</option><option value="cashier">Cashier</option><option value="admin">Admin</option></select></div>
          <div class="form-group"><label>Phone</label><input id="uPhone" name="phone" /></div>
        </div>
        <div class="form-group"><label>Password</label><input id="uPassword" name="password" type="password" /></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Save User</button>
      </form>
    </div>
  </div>

  <div class="footer">© Kafé Lumière Milk Tea Shop</div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.20.0/dist/jquery.validate.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/user.js"></script>
  <script>
    renderHeader('user');
    initUserAdmin();
  </script>
</body>
</html>
